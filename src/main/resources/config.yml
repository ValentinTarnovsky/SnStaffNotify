# ============================================================
#                      SnStaffNotify
#                   Configuration File
#                  Version: ${project.version}
# ============================================================

# Config version - DO NOT MODIFY
config-version: 3

# Enable debug logging
debug: false

# ============================================================
#                       DATABASE
# ============================================================
# MySQL connection to SnStaffLink's database.
# Players in the staff table are considered staff members.
database:
  host: "localhost"
  port: 3306
  database: "minecraft"
  username: "root"
  password: ""
  # Table name where staff members are stored
  table: "stafflink_users"
  # How often to refresh the staff cache (seconds)
  cache-seconds: 60

# ============================================================
#                      PERMISSIONS
# ============================================================
# Permission for the /staffnotify command
command-permission: "snstaffnotify.admin"

# ============================================================
#                     IGNORED PLAYERS
# ============================================================
# Players in this list will NOT generate notifications.
# Useful for bots, alt accounts, etc.
ignored-players:
  uuids: []
  names: []

# ============================================================
#                    DISCORD WEBHOOKS
# ============================================================
# Discord webhook integration for HelpOp and Report commands.
# Create a webhook in your Discord channel and paste the URL below.
webhooks:
  helpop:
    # Enable or disable the HelpOp Discord webhook
    enabled: false
    # Discord webhook URL for HelpOp notifications
    url: ""
  report:
    # Enable or disable the Report Discord webhook
    enabled: false
    # Discord webhook URL for Report notifications
    url: ""

# ============================================================
#                       COOLDOWNS
# ============================================================
# Cooldown in seconds for player commands. Set to 0 to disable.
cooldowns:
  # Cooldown for /helpop command (seconds)
  helpop: 30
  # Cooldown for /report command (seconds)
  report: 60
