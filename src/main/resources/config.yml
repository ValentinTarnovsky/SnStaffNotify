# ============================================================
#                      SnStaffNotify
#                   Configuration File
#                  Version: ${project.version}
# ============================================================

# Config version - DO NOT MODIFY
config-version: 2

# Enable debug logging
debug: false

# ============================================================
#                       DATABASE
# ============================================================
# MySQL connection to SnStaffLink's database.
# Players in the staff table are considered staff members.
database:
  host: "localhost"
  port: 3306
  database: "minecraft"
  username: "root"
  password: ""
  # Table name where staff members are stored
  table: "stafflink_users"
  # How often to refresh the staff cache (seconds)
  cache-seconds: 60

# ============================================================
#                      PERMISSIONS
# ============================================================
# Permission for the /staffnotify command
command-permission: "snstaffnotify.admin"

# ============================================================
#                     IGNORED PLAYERS
# ============================================================
# Players in this list will NOT generate notifications.
# Useful for bots, alt accounts, etc.
ignored-players:
  uuids: []
  names: []
